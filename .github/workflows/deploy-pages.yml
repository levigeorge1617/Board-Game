name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # gives you a manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. cancel-in-progress cancels older queued/running
# deploys so a stuck run can't wedge the queue (the cause of the flaky failures).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site (repo root — it's a static site, no build)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
